services:
  app:
    build:
      context: .
      dockerfile: docker/dev/Dockerfile
    working_dir: /workspace
    command: sleep infinity
    tty: true
    stdin_open: true
    volumes:
      - .:/workspace:cached
      - uv-cache:/home/vscode/.cache/uv
      - npm-cache:/home/vscode/.npm
    ports:
      - "8000:8000" # FastAPI
      - "5173:5173" # Frontend (Vite)
    environment:
      UV_LINK_MODE: copy
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

volumes:
  uv-cache:
  npm-cache: